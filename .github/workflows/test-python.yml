name: Test python bindings

on:
#  push:
#    branches: [ "main" , "master"]
  pull_request:
    branches: [ "main" , "master"]
  workflow_dispatch:

jobs:
  python-test:
    runs-on: ubuntu-latest
    container:
      # relies on repository name being all lower case
      image: ghcr.io/${{ github.repository }}
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4
      - run: echo 'conda activate base' >> ~/.bash_profile
      - run: git config --global --add safe.directory /__w/iterative-solver/iterative-solver
      - run: bash python/build.sh
      - run: cd python/test && python -m unittest
